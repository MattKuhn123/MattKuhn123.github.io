<!DOCTYPE html>
<html lang="en">

<head>
  <title>Test</title>
  <script src="./utils/utils.js"></script>
</head>

<body>
  <iframe title="test-bed" src="../pages/projects/mk-directives.html"></iframe>
</body>

<script>
  function test_savingsCalculation() {
    const doc = getTestDocument();
    changeValue(doc, "staff-count", 10);
    changeValue(doc, "wage", 10);
    changeValue(doc, "hours-saved", 10);

    const actual = Number(doc.querySelector("[name=savings-total]").getAttribute("data-value"));
    console.assert(actual === 1000, "%o", { actual, errorMessage: "expected savings-total to be 1000, but was not" });
  }

  document.querySelector("iframe").addEventListener("load", () => {
    test_savingsCalculation();
  });
</script>

</html>
