<!DOCTYPE html>
<html lang="en">

<head>
  <title>Test</title>
  <script src="../utils/utils.js"></script>
</head>

<body>
  <iframe title="test-bed" src="../../pages/projects/mk-directives.html"></iframe>
</body>

<script>
  function test_savingsCalculation() {
    const doc = getTestDocument();
    setAndDispatch(doc, "staff-count",  "value", 11, "change");
    setAndDispatch(doc, "wage",         "value", 10, "change");
    setAndDispatch(doc, "hours-saved",  "value", 10, "change");

    const actual = Number(doc.querySelector("[name=savings-total]").getAttribute("data-value"));
    const expected = 10 * 10 * 10;
    console.assert(actual === expected, `Assertion failed: expected savings-total to be: ${expected} but was ${actual}`);
  }

  document.querySelector("iframe").addEventListener("load", () => {
    test_savingsCalculation();
  });
</script>

</html>
