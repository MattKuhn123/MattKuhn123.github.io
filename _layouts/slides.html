<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ page.title }}</title>
  <style>
    body {
      font-family: 'Georgia', serif;
    }
    h1 {
      font-size: 2.2em;
      font-weight: bold;
      border-bottom: 3px solid #444;
      padding-bottom: 0.2em;
    }
    h2 {
      font-size: 1.8em;
      font-weight: bold;
    }
    h3 {
      font-size: 1.3em;
      color: #555;
    }
    .remark-slide-content {
      font-size: 1.4em;
      padding: 2em 3em;
      background: #fafafa;
      color: #222;
    }
    .remark-slide-content.title-slide {
      background: #222;
      color: #fafafa;
      text-align: center;
    }
    .remark-slide-content.title-slide h1 {
      border-bottom-color: #fafafa;
      font-size: 2.6em;
    }
    .remark-slide-content.title-slide h3 {
      color: #ccc;
    }
    .remark-code, .remark-inline-code {
      font-family: 'Courier New', monospace;
      background: #eee;
      padding: 0.1em 0.3em;
      border-radius: 3px;
    }
    .remark-code {
      padding: 0.8em 1em;
      display: block;
    }
    ul, ol {
      line-height: 1.9;
    }
    blockquote {
      border-left: 4px solid #aaa;
      margin-left: 0;
      padding-left: 1em;
      color: #555;
      font-style: italic;
    }
    .footnote {
      position: absolute;
      bottom: 1.5em;
      font-size: 0.7em;
      color: #888;
    }
    .remark-slide-number {
      font-size: 0.7em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <textarea id="source">
{{ page.slides }}
  </textarea>
  <script src="https://remarkjs.com/downloads/remark-latest.min.js"></script>
  <script>
    var slideshow = remark.create({
      ratio: '16:9',
      highlightStyle: 'github',
      highlightLines: true,
      countIncrementalSlides: false
    });
  </script>
</body>
</html>
