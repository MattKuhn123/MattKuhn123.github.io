<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ page.title }}</title>
  <style>
    .remark-slide-content.title-slide {
      background: #222;
      color: #fafafa;
      text-align: center;
    }
    .footnote {
      position: absolute;
      bottom: 1.5em;
      font-size: 0.7em;
    }
  </style>
</head>
<body>
  <textarea id="source">
{{ page.slides }}
  </textarea>
  <script src="https://remarkjs.com/downloads/remark-latest.min.js"></script>
  <script>
    var slideshow = remark.create({
      highlightStyle: 'github',
      highlightLines: true,
      countIncrementalSlides: false
    });
  </script>
</body>
</html>
