<body>
  <nav class="my-nav">
    <section>
      <div id="about-dropdown" class="btn btn-accent dropdown">
        <span>About</span>
        <div class="dropdown-content">
          <ul>
            <li>
              <a class="btn btn-accent" hx-boost="true" hx-push-url="true" hx-get="/pages/about/resume.html"hx-target="main">
                Resume
              </a>
            </li>
          </ul>
        </div>
      </div>
      <div id="projects-dropdown" class="btn btn-primary dropdown">
        <span>Projects</span>
        <div class="dropdown-content">
          <ul>
            <li>
              <a class="btn btn-accent" hx-boost="true" hx-push-url="true" hx-get="/pages/projects/mk-directives.html" hx-target="main">
                MK directives
              </a>
            </li>
          </ul>
        </div>
      </div>
      <div id="thoughts-dropdown" class="btn btn-accent dropdown">
        <span>Thoughts</span>
        <div class="dropdown-content">
          <ul>
            <li>
              <a class="btn btn-accent" hx-boost="true" hx-push-url="true" hx-get="/pages/thoughts/the-oath.html" hx-target="main">
                The Oath
              </a>

        </div>

    <span class="txt-primary">KuhnTech</span>
  </nav>

  <main>
    <div hx-trigger="load" hx-get="/pages/thoughts/the-oath.html" hx-swap="outerHTML"></div>
  </main>

  <footer class="my-footer">
    <span class="txt-primary">KuhnTech</span>
  </footer>
</body>

<script>
  window.addEventListener("popstate", (event) => {
    event.preventDefault();
    const pathname = document.location.pathname;
    if (event.state.htmx && pathname !== "/") {
      htmx.ajax('GET', pathname, { target: 'main' });
    }
  });

  window.onload = function (e) {
    const htmxIdx = window.location.href.indexOf("?htmx=");
    const isHtmxRedirect = htmxIdx > 0;
    if (isHtmxRedirect) {
      const page = window.location.href.substring(htmxIdx + "?htmx=".length);
      htmx.ajax('GET', page, { target: 'main' });
    }
  }
</script>

</html>
