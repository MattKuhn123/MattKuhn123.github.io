<form id="cost-estimate-form">
  <h1 class="txt-primary banner">Cost/Benefit analysis</h1>

  <h2 class="txt-primary">Benefit</h2>

  <fieldset class="my-fieldset" id="staff-fieldset">
    <legend>Staff savings</legend>
    <label for="staff-count">Staff</label>
    <input class="my-input" id="staff-count" name="staff-count" type="number"/>

    <label for="staff-wage">Wage</label>
    <input class="my-input" id="staff-wage" name="staff-wage" type="number"/>

    <label for="staff-weekly-hours-saved" aria-describedby="hours-saved-tooltip">
      Hours saved weekly
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="hours-saved-tooltip">
        How many hours per week can the software save an individual member of the staff?
      </div>
    </label>
    <input class="my-input" id="staff-weekly-hours-saved" name="staff-weekly-hours-saved" type="number"/>

    <label for="staff-savings-estimate">Yearly estimate: </label>
    <input class="my-input" id="staff-savings-estimate" name="staff-savings-estimate" mk-func="multiply" mk-args="staff-count,staff-wage,staff-weekly-hours-saved" readonly tabindex="-1" type="number"/>
  </fieldset>

  <fieldset class="my-fieldset" id="profit-fieldset">
    <legend>Profit opportunity</legend>
    <label for="profit" aria-describedby="profit-tooltip">
      Profit
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="profit-tooltip">
        What is your possible profit with this software?
      </div>
    </label>
    <input class="my-input" id="profit" name="profit" type="number"/>

    <label for="profit-count" aria-describedby="profit-count-tooltip">
      Yearly opportunities
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="profit-count-tooltip">
        How many times per year does this opportunity arise?
      </div>
    </label>
    <input class="my-input" id="profit-count" name="profit-count" type="number"/>

    <label for="profit-chance" aria-describedby="profit-chance-tooltip">
      Estimated software accuracy
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="profit-chance-tooltip" >
        What is the likelihood the software will forecast correctly or attract business as anticipated?
      </div>
    </label>
    <output id="profit-estimate-mask" mk-mask-format="percentage" mk-masks="profit-chance"></output>
    <input class="my-input" id="profit-chance" name="profit-chance" type="range" step=".1" min="0" max="1"/>

    <label for="profit-wage">Yearly estimate: </label>
    <input class="my-input" id="profit-estimate" name="profit-estimate" mk-func="multiply" mk-args="profit,profit-count,profit-chance" readonly tabindex="-1" type="number"/>
  </fieldset>

  <fieldset class="my-fieldset" id="regulatory-compliance-fieldset">
    <legend>Regulatory compliance</legend>
    <label for="fine" aria-describedby="fine-tooltip">
      Fine
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="fine-tooltip">
        What is the fine for not complying with this regulation?
      </div>
    </label>
    <input class="my-input" id="fine" name="fine" type="number"/>

    <label for="fine-count" aria-describedby="fine-count-tooltip">
      Yearly opportunities
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="fine-count-tooltip">
        How many times per year can this fine apply?
      </div>
    </label>
    <input class="my-input" id="fine-count" name="fine-count" type="number"/>
    <label for="staff-wage">Yearly estimate: </label>
    <input class="my-input" id="fine-estimate" name="fine-estimate" mk-func="multiply" mk-args="fine,fine-count" readonly tabindex="-1" type="number"/>
  </fieldset>

  <h2 class="txt-primary">Cost</h2>

  <fieldset class="my-fieldset" id="labor-fieldset">
    <label for="labor" aria-describedby="labor-tooltip">
      Labor
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="labor-tooltip">
        Our estimated average hourly rate.
      </div>
    </label>
    <input class="my-input" readonly tabindex="-1" id="labor" name="labor" type="number" value="50"/>

    <label for="labor-hours" aria-describedby="labor-hours-tooltip">
      Hours
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="labor-hours-tooltip">
        Hour many hours do we estimate? (calculator available <a href="./pages/time-estimate.html" target="_blank">here</a>) 
      </div>
    </label>
    <input class="my-input" id="labor-hours" name="labor-hours" type="number"/>

    <label for="labor-estimate">Estimate: </label>
    <input class="my-input" id="labor-estimate" name="labor-estimate" mk-func="multiply" mk-args="labor,labor-hours" readonly tabindex="-1" type="number"/>
  </fieldset>

  <fieldset class="my-fieldset" id="infrastructure-fieldset">
    <legend>Infrastructure</legend>
    <label for="cloud" aria-describedby="cloud-tooltip">
      Yearly cloud cost
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="cloud-tooltip">
        The cost to run web servers, host web storage, execute compute, etc? If unknown or not applicable, leave at 0.
      </div>
    </label>
    <output id="infrastructure-mask" mk-mask-format="currency" mk-masks="cloud"></output>
    <input class="my-input" id="cloud" name="cloud" type="range" step="1000" min="0" max="50000"/>

    <label for="licenses" aria-describedby="licenses-tooltip">
      Licenses
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="licenses-tooltip">
        Are we hooking into any systems that you want to use (e.g. Mail Chimp, Wix, etc)? If unknown or not applicable, leave at 0.
      </div>
    </label>
    <output id="license-mask" mk-mask-format="currency" mk-masks="license"></output>
    <input class="my-input" id="license" name="license" type="range" step="1000" min="0" max="50000"/>

    <label for="infrastructure-estimate">Yearly stage estimate: </label>
    <input class="my-input" id="infrastructure-stage-estimate" name="infrastructure-stage-estimate" mk-func="sum", mk-args="license,cloud" readonly tabindex="-1" type="number"/>

    <label for="infrastructure-stages" aria-describedby="infrastructure-stages-tooltip">
      Stages
      <button type="button" class="btn btn-accent btn-icon" tabIndex="-1">?</button>
      <div role="tooltip" id="infrastructure-stages-tooltip">
        How many stages will you need to run your infrastructure in? (Production, Test, QA, Dev, UAT, etc)
      </div>
    </label>
    <input class="my-input" id="infrastructure-stages" name="infrastructure-stages" type="number"/>

    <label for="infrastructure-estimate">Yearly estimate: </label>
    <input class="my-input" id="infrastructure-estimate" name="infrastructure-estimate" mk-func="multiply" mk-args="infrastructure-stage-estimate,infrastructure-stages" readonly tabindex="-1" type="number"/>
  </fieldset>

  <fieldset class="my-fieldset sticky-bottom" id="net-fieldset">
    <h3 class="txt-primary banner">Net</h3>
      <input hidden id="benefit" name="benefit" mk-func="sum" mk-args="staff-savings-estimate,profit-estimate,fine-estimate" type="number"/>
      <input hidden id="cost" name="cost" mk-func="sum" mk-args="infrastructure-estimate,labor-estimate" mk-negate type="number"/>
      <input hidden id="net" name="net" mk-func="sum" mk-args="benefit,cost" type="number"/>
      <span mk-mask-format="currency" mk-masks="net">$0.00</span>
  </fieldset>

  <button class="btn btn-primary fixed-save-btn" type="button" mk-opens-dialog="report-dialog">
  </button>
  
  <dialog id="report-dialog" class="my-dialog">
    <button type="button" class="x btn btn-accent" mk-closes-dialog="report-dialog">
      &#10006;
    </button>
    <h3 class="txt-primary banner">Save and load report</h3>
    <section class="space-children-100 banner">
      <input class="my-input" name="report-name" type="text" required minlength="3" maxlength="20"/>
      <textarea class="my-input" name="report-description" required minlength="10" maxlength="128"></textarea>
    </section>
    <section class="space-children-100 banner">
      <button class="btn btn-accent" type="button" mk-form-to-json-file>Download</button>
      <button class="btn btn-accent" type="button" mk-json-file-to-form-for="uLoad-btn">Upload</button>
      <input hidden id="uLoad-btn" type="file" mk-json-file-to-form/>
    </section>
    <details class="space-children-100">
      <summary class="txt-primary">Examples</summary>
      <select id="examples" aria-label="examples" class="btn btn-primary" mk-json-file-from-fetch>
        <option value="">(Choose)</option>
        <option value="/data/cost-benefit/web-app.json">web app</option>
      </select>
    </details>
  </dialog>
</form>

<script>
  window.onload = function(e) {
    window.location.href = window.location.origin+"?htmx="+window.location.pathname;
  }
</script>
